version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sensordb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingestion-service:
    build:
      context: .
      dockerfile: src/IngestionService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Database=sensordb;Username=postgres;Password=postgres
      - Services__Consensus=http://consensus-service
      - Services__Notification=http://notification-service
    ports:
      - "5001:8080"
    depends_on:
      db:
        condition: service_healthy

  consensus-service:
    build:
      context: .
      dockerfile: src/ConsensusService/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Database=sensordb;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: src/NotificationService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5003:8080"

  ingress:
    build:
      context: .
      dockerfile: src/Ingress/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Services__Ingestion=http://ingestion-service:8080
      - Services__Notification=http://notification-service:8080
    ports:
      - "8080:8080"
    depends_on:
      - ingestion-service
      - notification-service

volumes:
  pgdata:
